<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS3 Interactive Quest Guide</title>
<style>
  :root {
    --bg-dark: #0d0d0d;
    --bg-panel: #141414;
    --bg-card: #1a1a1a;
    --bg-hover: #222;
    --bg-selected: #1e2a1a;
    --accent: #8fbc45;
    --accent-glow: #a8d45a;
    --gold: #c8a84b;
    --gold-light: #e8c86a;
    --red: #c0392b;
    --blue: #2980b9;
    --purple: #8e44ad;
    --border: #2a2a2a;
    --border-light: #333;
    --text: #d4d4d4;
    --text-muted: #777;
    --text-bright: #f0f0f0;
    --members: #c8a84b;
    --free: #5cb85c;
    --novice: #5cb85c;
    --intermediate: #f0ad4e;
    --experienced: #e67e22;
    --master: #e74c3c;
    --grandmaster: #9b59b6;
    --shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1200 50%, #0a0a0a 100%);
    border-bottom: 2px solid var(--gold);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% -20%, rgba(200,168,75,0.1) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo .icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold) 0%, #8a6800 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(200,168,75,0.4);
  }
  .header-logo h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.5px;
    text-shadow: 0 0 20px rgba(200,168,75,0.4);
  }
  .header-logo h1 span { color: var(--accent-glow); }
  .header-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .stat-badge {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-badge .val { color: var(--gold-light); font-weight: 700; font-size: 15px; }
  .stat-badge .lbl { color: var(--text-muted); font-size: 11px; }

  /* ── LAYOUT ── */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-controls {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 8px 12px 8px 34px;
    color: var(--text-bright);
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }
  .filter-row {
    display: flex;
    gap: 6px;
  }
  .filter-row select {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 6px 8px;
    color: var(--text);
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  .filter-row select:focus { border-color: var(--gold); }
  .filter-row select option { background: var(--bg-card); }

  .quest-count {
    padding: 6px 12px;
    font-size: 11px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .quest-count span { color: var(--accent); font-weight: 600; }

  .quest-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .quest-list::-webkit-scrollbar { width: 4px; }
  .quest-list::-webkit-scrollbar-track { background: transparent; }
  .quest-list::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

  .quest-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
    position: relative;
  }
  .quest-item:hover { background: var(--bg-hover); }
  .quest-item.active {
    background: var(--bg-selected);
    border-left-color: var(--accent);
  }
  .quest-item.completed .quest-name { color: var(--text-muted); text-decoration: line-through; }
  .quest-item.completed { opacity: 0.7; }

  .quest-checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border-light);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    cursor: pointer;
    background: transparent;
  }
  .quest-item.completed .quest-checkbox {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-size: 11px;
  }

  .quest-info { flex: 1; min-width: 0; }
  .quest-name {
    font-size: 13px;
    color: var(--text-bright);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .quest-meta {
    display: flex;
    gap: 5px;
    margin-top: 3px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .tag.free { background: rgba(92,184,92,0.15); color: var(--free); border: 1px solid rgba(92,184,92,0.3); }
  .tag.members { background: rgba(200,168,75,0.15); color: var(--members); border: 1px solid rgba(200,168,75,0.3); }
  .tag.novice { background: rgba(92,184,92,0.1); color: var(--novice); border: 1px solid rgba(92,184,92,0.25); }
  .tag.intermediate { background: rgba(240,173,78,0.1); color: var(--intermediate); border: 1px solid rgba(240,173,78,0.25); }
  .tag.experienced { background: rgba(230,126,34,0.1); color: var(--experienced); border: 1px solid rgba(230,126,34,0.25); }
  .tag.master { background: rgba(231,76,60,0.1); color: var(--master); border: 1px solid rgba(231,76,60,0.25); }
  .tag.grandmaster { background: rgba(155,89,182,0.1); color: var(--purple); border: 1px solid rgba(155,89,182,0.25); }
  .tag.length { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }
  .tag.qp { background: rgba(200,168,75,0.08); color: var(--gold); border: 1px solid rgba(200,168,75,0.2); }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    background: var(--bg-dark);
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-muted);
  }
  .empty-state .big-icon { font-size: 64px; opacity: 0.3; }
  .empty-state h2 { font-size: 22px; color: var(--text); }
  .empty-state p { font-size: 14px; text-align: center; max-width: 360px; line-height: 1.6; }

  /* ── QUEST DETAIL ── */
  .quest-detail { max-width: 860px; }

  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }
  .detail-title h2 {
    font-size: 26px;
    color: var(--gold-light);
    font-weight: 700;
    line-height: 1.2;
    text-shadow: 0 0 30px rgba(200,168,75,0.2);
  }
  .detail-title .detail-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .detail-tags .tag { font-size: 12px; padding: 3px 10px; }

  .complete-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #6a9e30 100%);
    color: #0a1a00;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
    box-shadow: 0 2px 12px rgba(143,188,69,0.3);
    flex-shrink: 0;
  }
  .complete-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(143,188,69,0.4); }
  .complete-btn.done {
    background: linear-gradient(135deg, #555 0%, #333 100%);
    color: var(--text-muted);
    box-shadow: none;
  }

  /* ── PROGRESS BAR ── */
  .progress-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .progress-label span:last-child { color: var(--accent); font-weight: 600; }
  .progress-bar {
    background: var(--border);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-glow) 100%);
    border-radius: 4px;
    transition: width .4s ease;
    box-shadow: 0 0 8px rgba(143,188,69,0.4);
  }

  /* ── SECTIONS ── */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .section-header:hover { background: rgba(255,255,255,0.04); }
  .section-header h3 {
    flex: 1;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .section-icon { font-size: 16px; }
  .section-toggle { color: var(--text-muted); font-size: 12px; transition: transform .2s; }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }
  .section-body { padding: 14px 16px; }
  .section.collapsed .section-body { display: none; }

  /* Requirements */
  .req-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .req-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .req-item .req-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .req-item .req-value { font-size: 13px; color: var(--text-bright); }
  .req-none { color: var(--text-muted); font-style: italic; font-size: 13px; }

  /* Steps */
  .steps-list { display: flex; flex-direction: column; gap: 8px; }
  .step-item {
    display: flex;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .step-item:hover { background: rgba(255,255,255,0.05); border-color: var(--border-light); }
  .step-item.done {
    background: rgba(143,188,69,0.06);
    border-color: rgba(143,188,69,0.25);
  }
  .step-item.done .step-text { color: var(--text-muted); text-decoration: line-through; }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--border-light);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }
  .step-item.done .step-num {
    background: var(--accent);
    color: #0a1a00;
  }
  .step-item.current .step-num {
    background: var(--gold);
    color: #1a0d00;
    box-shadow: 0 0 10px rgba(200,168,75,0.4);
  }
  .step-item.current {
    border-color: rgba(200,168,75,0.3);
    background: rgba(200,168,75,0.06);
  }
  .step-text { font-size: 13px; line-height: 1.55; flex: 1; padding-top: 4px; }
  .step-note {
    font-size: 11px;
    color: var(--gold);
    margin-top: 4px;
    padding: 4px 8px;
    background: rgba(200,168,75,0.08);
    border-radius: 4px;
    border-left: 2px solid var(--gold);
  }

  /* Rewards */
  .rewards-list { display: flex; flex-direction: column; gap: 6px; }
  .reward-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(200,168,75,0.04);
    border: 1px solid rgba(200,168,75,0.15);
    border-radius: 6px;
    font-size: 13px;
  }
  .reward-icon { font-size: 16px; flex-shrink: 0; }
  .reward-xp { color: var(--gold); font-weight: 600; }

  /* Tips */
  .tips-list { display: flex; flex-direction: column; gap: 8px; }
  .tip-item {
    display: flex;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(41,128,185,0.06);
    border: 1px solid rgba(41,128,185,0.2);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.55;
  }
  .tip-icon { flex-shrink: 0; font-size: 15px; }

  /* No steps message */
  .no-steps-msg {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .wiki-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 8px 16px;
    background: rgba(41,128,185,0.15);
    border: 1px solid rgba(41,128,185,0.3);
    border-radius: 6px;
    color: #5dade2;
    text-decoration: none;
    font-size: 13px;
    transition: all .15s;
  }
  .wiki-link:hover { background: rgba(41,128,185,0.25); color: #7fb3d3; }

  /* ── SERIES BADGE ── */
  .series-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: rgba(142,68,173,0.12);
    border: 1px solid rgba(142,68,173,0.3);
    border-radius: 6px;
    font-size: 12px;
    color: #bb8fce;
    margin-bottom: 16px;
  }

  /* ── RESET / ACTIONS ── */
  .detail-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
  }
  .action-btn:hover { border-color: var(--text-muted); color: var(--text); background: var(--bg-hover); }
  .action-btn.danger:hover { border-color: var(--red); color: #e74c3c; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="icon">⚔️</div>
    <h1>RS3 <span>Quest</span> Guide</h1>
  </div>
  <div class="header-stats">
    <div class="stat-badge">
      <span class="val" id="stat-completed">0</span>
      <span class="lbl">/ <span id="stat-total">0</span> Quests</span>
    </div>
    <div class="stat-badge">
      <span class="val" id="stat-qp">0</span>
      <span class="lbl">/ 469 QP</span>
    </div>
    <div class="stat-badge">
      <span class="val" id="stat-pct">0%</span>
      <span class="lbl">Complete</span>
    </div>
  </div>
</header>

<div class="app-body">
  <div class="sidebar">
    <div class="sidebar-controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search quests..." oninput="filterQuests()">
      </div>
      <div class="filter-row">
        <select id="filter-membership" onchange="filterQuests()">
          <option value="">All Access</option>
          <option value="Free">Free-to-Play</option>
          <option value="Members">Members</option>
        </select>
        <select id="filter-difficulty" onchange="filterQuests()">
          <option value="">All Levels</option>
          <option value="Novice">Novice</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Experienced">Experienced</option>
          <option value="Master">Master</option>
          <option value="Grandmaster">Grandmaster</option>
        </select>
      </div>
      <div class="filter-row">
        <select id="filter-series" onchange="filterQuests()">
          <option value="">All Series</option>
        </select>
        <select id="filter-status" onchange="filterQuests()">
          <option value="">All Status</option>
          <option value="todo">Not Started</option>
          <option value="done">Completed</option>
        </select>
      </div>
    </div>
    <div class="quest-count">
      <span>Showing <span id="count-visible">0</span> quests</span>
      <span id="count-done-label"></span>
    </div>
    <div class="quest-list" id="quest-list"></div>
  </div>

  <div class="main" id="main-content">
    <div class="empty-state">
      <div class="big-icon">🗺️</div>
      <h2>Choose Your Quest</h2>
      <p>Select a quest from the list to view the full interactive step-by-step guide. Track your progress as you go — it's saved automatically.</p>
    </div>
  </div>
</div>

<script>

//  QUEST DATABASE
// ─────────────────────────────────────────────

  {

      quests: []
    },

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('rs3_quest_state') || '{"completed":{},"steps":{}}');
let activeQuestId = null;
let filteredQuests = [...QUESTS];

function saveState() {
  localStorage.setItem('rs3_quest_state', JSON.stringify(state));
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init() {
  populateSeriesFilter();
  renderQuestList();
  updateHeaderStats();
}

function populateSeriesFilter() {
  const series = [...new Set(QUESTS.map(q => q.series).filter(Boolean))].sort();
  const sel = document.getElementById('filter-series');
  series.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

// ─────────────────────────────────────────────
//  FILTERING
// ─────────────────────────────────────────────
function filterQuests() {
  const q = document.getElementById('search').value.toLowerCase();
  const mem = document.getElementById('filter-membership').value;
  const diff = document.getElementById('filter-difficulty').value;
  const series = document.getElementById('filter-series').value;
  const status = document.getElementById('filter-status').value;

  filteredQuests = QUESTS.filter(quest => {
    if (q && !quest.name.toLowerCase().includes(q)) return false;
    if (mem && quest.membership !== mem) return false;
    if (diff && quest.difficulty !== diff) return false;
    if (series && quest.series !== series) return false;
    const isDone = !!state.completed[quest.id];
    if (status === 'done' && !isDone) return false;
    if (status === 'todo' && isDone) return false;
    return true;
  });

  renderQuestList();
}

// ─────────────────────────────────────────────
//  RENDER QUEST LIST
// ─────────────────────────────────────────────
function renderQuestList() {
  const list = document.getElementById('quest-list');
  list.innerHTML = '';

  filteredQuests.forEach(quest => {
    const done = !!state.completed[quest.id];
    const item = document.createElement('div');
    item.className = 'quest-item' + (done ? ' completed' : '') + (quest.id === activeQuestId ? ' active' : '');
    item.dataset.id = quest.id;

    const diffClass = quest.difficulty.toLowerCase().replace(/ /g,'-');

    item.innerHTML = `
      <div class="quest-checkbox" onclick="toggleComplete(event,'${quest.id}')">${done ? '✓' : ''}</div>
      <div class="quest-info">
        <div class="quest-name">${quest.name}</div>
        <div class="quest-meta">
          <span class="tag ${quest.membership === 'Free' ? 'free' : 'members'}">${quest.membership === 'Free' ? 'F2P' : 'P2P'}</span>
          <span class="tag ${diffClass}">${quest.difficulty}</span>
          <span class="tag qp">${quest.qp} QP</span>
          ${quest.series ? `<span class="tag length">${quest.series}</span>` : ''}
        </div>
      </div>
    `;

    item.addEventListener('click', (e) => {
      if (!e.target.closest('.quest-checkbox')) openQuest(quest.id);
    });

    list.appendChild(item);
  });

  const visible = filteredQuests.length;
  const done = QUESTS.filter(q => state.completed[q.id]).length;
  document.getElementById('count-visible').textContent = visible;
  document.getElementById('count-done-label').textContent = `${done} done`;
}

// ─────────────────────────────────────────────
//  OPEN QUEST
// ─────────────────────────────────────────────
function openQuest(id) {
  activeQuestId = id;
  const quest = QUESTS.find(q => q.id === id);
  if (!quest) return;

  // Update sidebar selection
  document.querySelectorAll('.quest-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  const stepsDone = state.steps[id] || {};
  const totalSteps = quest.steps.length;
  const doneCount = Object.values(stepsDone).filter(Boolean).length;
  const pct = totalSteps > 0 ? Math.round((doneCount / totalSteps) * 100) : 0;
  const questDone = !!state.completed[id];

  const diffClass = quest.difficulty.toLowerCase().replace(/ /g,'-');

  // Build requirements HTML
  let reqHtml = '<div class="req-grid">';
  if (quest.requirements.skills.length) {
    quest.requirements.skills.forEach(s => {
      reqHtml += `<div class="req-item"><div class="req-label">Skill</div><div class="req-value">⚔️ ${s}</div></div>`;
    });
  }
  if (quest.requirements.quests.length) {
    quest.requirements.quests.forEach(q => {
      reqHtml += `<div class="req-item"><div class="req-label">Quest</div><div class="req-value">📜 ${q}</div></div>`;
    });
  }
  if (quest.requirements.items.length) {
    quest.requirements.items.forEach(i => {
      reqHtml += `<div class="req-item"><div class="req-label">Item</div><div class="req-value">🎒 ${i}</div></div>`;
    });
  }
  if (!quest.requirements.skills.length && !quest.requirements.quests.length && !quest.requirements.items.length) {
    reqHtml += '<p class="req-none">No requirements — anyone can start this quest!</p>';
  }
  reqHtml += '</div>';

  // Build steps HTML
  let stepsHtml = '';
  if (quest.steps.length > 0) {
    stepsHtml = '<div class="steps-list">';
    quest.steps.forEach((step, i) => {
      const isDone = !!stepsDone[i];
      const isCurrent = !isDone && i === Object.values(stepsDone).filter(Boolean).length;
      stepsHtml += `
        <div class="step-item ${isDone ? 'done' : ''} ${isCurrent ? 'current' : ''}" onclick="toggleStep('${id}', ${i})">
          <div class="step-num">${isDone ? '✓' : i + 1}</div>
          <div>
            <div class="step-text">${step.text.replace(/\n/g,'<br>')}</div>
            ${step.note ? `<div class="step-note">💡 ${step.note}</div>` : ''}
          </div>
        </div>
      `;
    });
    stepsHtml += '</div>';
  } else {
    stepsHtml = `
      <div class="no-steps-msg">
        <p>Detailed walkthrough coming soon!</p>
        <a class="wiki-link" href="${quest.wiki}" target="_blank">📖 View Full Guide on RuneScape Wiki</a>
      </div>
    `;
  }

  // Build rewards HTML
  const rewardsHtml = '<div class="rewards-list">' +
    quest.rewards.map(r => `
      <div class="reward-item">
        <span class="reward-icon">${r.icon}</span>
        <span>${r.text}</span>
      </div>
    `).join('') + '</div>';

  // Build tips HTML
  const tipsHtml = quest.tips && quest.tips.length
    ? '<div class="tips-list">' + quest.tips.map(t => `
        <div class="tip-item">
          <span class="tip-icon">💡</span>
          <span>${t}</span>
        </div>
      `).join('') + '</div>'
    : '<p style="color:var(--text-muted);font-size:13px">No tips available.</p>';

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="quest-detail">
      <div class="detail-header">
        <div class="detail-title">
          <h2>${quest.name}</h2>
          <div class="detail-tags">
            <span class="tag ${quest.membership === 'Free' ? 'free' : 'members'}">${quest.membership === 'Free' ? 'Free-to-Play' : 'Members Only'}</span>
            <span class="tag ${diffClass}">${quest.difficulty}</span>
            <span class="tag length">${quest.length}</span>
            <span class="tag qp">${quest.qp} Quest Point${quest.qp > 1 ? 's' : ''}</span>
          </div>
        </div>
        <button class="complete-btn ${questDone ? 'done' : ''}" onclick="toggleComplete(event, '${id}')">
          ${questDone ? '✓ Completed' : 'Mark Complete'}
        </button>
      </div>

      ${quest.series ? `<div class="series-badge">📚 Part of the <strong>${quest.series}</strong> quest series</div>` : ''}

      <div class="progress-section">
        <div class="progress-label">
          <span>Step Progress</span>
          <span>${doneCount} / ${totalSteps} steps — ${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: ${pct}%"></div>
        </div>
      </div>

      <div class="section" id="sect-req">
        <div class="section-header" onclick="toggleSection('sect-req')">
          <span class="section-icon">📋</span>
          <h3>Requirements</h3>
          <span class="section-toggle">▾</span>
        </div>
        <div class="section-body">${reqHtml}</div>
      </div>

      <div class="section" id="sect-steps">
        <div class="section-header" onclick="toggleSection('sect-steps')">
          <span class="section-icon">🗺️</span>
          <h3>Walkthrough</h3>
          <span class="section-toggle">▾</span>
        </div>
        <div class="section-body">${stepsHtml}</div>
      </div>

      <div class="section" id="sect-rewards">
        <div class="section-header" onclick="toggleSection('sect-rewards')">
          <span class="section-icon">🏆</span>
          <h3>Rewards</h3>
          <span class="section-toggle">▾</span>
        </div>
        <div class="section-body">${rewardsHtml}</div>
      </div>

      <div class="section collapsed" id="sect-tips">
        <div class="section-header" onclick="toggleSection('sect-tips')">
          <span class="section-icon">💡</span>
          <h3>Tips & Notes</h3>
          <span class="section-toggle">▾</span>
        </div>
        <div class="section-body">${tipsHtml}</div>
      </div>

      <div class="detail-actions">
        <a class="action-btn" href="${quest.wiki}" target="_blank">📖 Open RS3 Wiki</a>
        <button class="action-btn" onclick="resetSteps('${id}')">↺ Reset Steps</button>
        <button class="action-btn danger" onclick="clearQuestData('${id}')">🗑 Clear Progress</button>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function toggleStep(questId, stepIndex) {
  if (!state.steps[questId]) state.steps[questId] = {};
  state.steps[questId][stepIndex] = !state.steps[questId][stepIndex];
  saveState();
  openQuest(questId);
}

function toggleComplete(e, questId) {
  e.stopPropagation();
  state.completed[questId] = !state.completed[questId];
  if (state.completed[questId] && state.steps[questId] !== undefined) {
    const quest = QUESTS.find(q => q.id === questId);
    if (quest) {
      quest.steps.forEach((_, i) => { state.steps[questId][i] = true; });
    }
  }
  saveState();
  renderQuestList();
  updateHeaderStats();
  if (activeQuestId === questId) openQuest(questId);
}

function resetSteps(questId) {
  state.steps[questId] = {};
  saveState();
  openQuest(questId);
}

function clearQuestData(questId) {
  delete state.steps[questId];
  delete state.completed[questId];
  saveState();
  renderQuestList();
  updateHeaderStats();
  openQuest(questId);
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('collapsed');
}

function updateHeaderStats() {
  const total = QUESTS.length;
  const done = QUESTS.filter(q => state.completed[q.id]).length;
  const qp = QUESTS.filter(q => state.completed[q.id]).reduce((s, q) => s + q.qp, 0);
  const pct = Math.round((done / total) * 100);

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-completed').textContent = done;
  document.getElementById('stat-qp').textContent = qp;
  document.getElementById('stat-pct').textContent = pct + '%';
}

// ─────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────
init();
